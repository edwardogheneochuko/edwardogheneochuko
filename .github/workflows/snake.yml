name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Create dist folder
      - name: Create dist folder
        run: mkdir -p dist

      # 3️⃣ Generate GitHub Snake animations
      - name: Generate GitHub Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg
            dist/ocean.gif
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      # 4️⃣ Update README with GIF
      - name: Update README
        run: |
          GIF_PATH="dist/ocean.gif"
          README_FILE="README.md"
          
          # Check if README exists
          if [ ! -f "$README_FILE" ]; then
            echo "# GitHub Snake" > $README_FILE
          fi

          # Remove previous GIF line if exists
          sed -i '/!\[Snake GIF\]/d' $README_FILE

          # Add the new GIF at the top
          sed -i "1i ![Snake GIF]($GIF_PATH)" $README_FILE

      # 5️⃣ Deploy to output branch
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
