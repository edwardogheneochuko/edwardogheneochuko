name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Create dist folder
      - name: Create dist folder
        run: mkdir -p dist

      # 3️⃣ Generate Snake animations
      - name: Generate GitHub Snake
        uses: Platane/snk@v3
        with:
          github_user_name: edwardogheneochuko  # your GitHub username
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg
            dist/ocean.gif
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # Use your PAT here

      # 4️⃣ Deploy generated files to 'output' branch
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PAT_TOKEN }}  # Use your PAT here too
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
